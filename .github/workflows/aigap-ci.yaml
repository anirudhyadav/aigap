name: aigap CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install (editable + dev)
        run: pip install -e ".[dev]"
      - name: Ruff
        run: ruff check .
      - name: Unit tests
        run: pytest tests/unit -q

  guardrail-check:
    runs-on: ubuntu-latest
    needs: lint-test
    # Live Anthropic calls — skip when the secret is not configured (e.g. forks).
    if: ${{ secrets.ANTHROPIC_API_KEY != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install aigap from this branch
        run: pip install -e ".[dev]"
      - name: Run aigap check
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          aigap check . \
            --policy .aigap-policy.yaml \
            --dataset tests/golden_dataset.jsonl \
            --baseline aigap-baseline.json \
            --ci \
            --fail-on high \
            --output aigap-report.json
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aigap-report
          path: aigap-report.json
